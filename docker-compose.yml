version: '3.9'

services:
  # ── PostgreSQL ─────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: workpulse-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       workpulse
      POSTGRES_USER:     workpulse
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-workpulse_secret}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U workpulse -d workpulse"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: workpulse-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_secret} --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis_secret}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Backend ────────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: workpulse-backend
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      NODE_ENV:            production
      PORT:                4000
      DATABASE_URL:        postgresql://workpulse:${POSTGRES_PASSWORD:-workpulse_secret}@postgres:5432/workpulse
      REDIS_URL:           redis://:${REDIS_PASSWORD:-redis_secret}@redis:6379
      CORS_ORIGINS:        ${CORS_ORIGINS:-http://localhost:3000}
      RATE_LIMIT_PUBLIC:   ${RATE_LIMIT_PUBLIC:-100}
      RATE_LIMIT_AUTHENTICATED: ${RATE_LIMIT_AUTHENTICATED:-500}
      RATE_LIMIT_PREDICT:  ${RATE_LIMIT_PREDICT:-20}
      JWT_SECRET:          ${JWT_SECRET:-change-me-in-production}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:4000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ── Frontend ───────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: workpulse-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV:       production
      NEXT_PUBLIC_API_URL: http://backend:4000
    depends_on:
      backend:
        condition: service_healthy

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  default:
    name: workpulse-network
